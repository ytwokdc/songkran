<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สงกรานต์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    background: url('images/bg.png') center center / cover no-repeat fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ===== CUSTOM CURSOR ===== */
  #custom-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-20%, -10%);
    height: auto;
    transition: width 0.08s ease;
  }

  /* ===== BANNER ===== */
  .banner-wrap {
    width: 100%;
    max-width: 1200px;
    padding: 24px 24px 0;
    display: flex;
    justify-content: center;
  }
  .banner-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ===== BUTTON GRID ===== */
  .grid-wrap {
    width: 100%;
    max-width: 1200px;
    padding: 28px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .btn-item {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
  }

  .btn-item img.btn-img {
    display: block;
    width: var(--btn-width, 160px);
    height: auto;
    transition: transform 0.08s ease;
    -webkit-user-drag: none;
  }

  .btn-item:active img.btn-img {
    transform: scale(0.95);
  }

  /* ===== FLOAT TEXT ===== */
  .float-text {
    position: absolute;
    left: 50%;
    top: 20%;
    pointer-events: none;
    font-size: 1.1rem;
    font-weight: 800;
    color: #fff;
    text-shadow:
      0 0 12px rgba(255,120,0,1),
      0 0 24px rgba(255,200,0,0.8),
      0 2px 6px rgba(0,0,0,0.6);
    white-space: nowrap;
    animation: floatUp 1.5s ease-out forwards;
    z-index: 1000;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    60%  { opacity: 1; transform: translateX(-50%) translateY(-70px) scale(1.15); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-120px) scale(0.9); }
  }

  @media (max-width: 900px) {
    .btn-row { gap: 8px; }
    .btn-item img.btn-img { width: 110px; }
  }
  @media (max-width: 600px) {
    .btn-row { flex-wrap: wrap; }
    .btn-item img.btn-img { width: 85px; }
  }
</style>
</head>
<body>

<div class="banner-wrap">
  <img src="images/banner.png" alt="">
</div>

<div class="grid-wrap">
  <div class="btn-row" id="row1"></div>
  <div class="btn-row" id="row2"></div>
</div>

<img id="custom-cursor" src="images/cursor_normal.png" alt="">

<script>
const cursorEl = document.getElementById('custom-cursor');
const row1 = document.getElementById('row1');
const row2 = document.getElementById('row2');

document.documentElement.style.setProperty('--btn-width', CONFIG.buttonWidth + 'px');
cursorEl.style.width = CONFIG.cursorSize.normal + 'px';

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function buildButton(num) {
  const id = pad(num);
  const wrap = document.createElement('div');
  wrap.className = 'btn-item';

  const img = document.createElement('img');
  img.className = 'btn-img';
  img.src = `images/${id}_normal.png`;
  img.alt = CONFIG.buttonNames[num - 1] || `ปุ่มที่ ${num}`;
  img.draggable = false;
  wrap.appendChild(img);

  let hovered = false;

  wrap.addEventListener('mouseenter', () => {
    hovered = true;
    img.src = `images/${id}_over.png`;
    cursorEl.src = 'images/cursor_over.png';
    cursorEl.style.width = CONFIG.cursorSize.over + 'px';
  });
  wrap.addEventListener('mouseleave', () => {
    hovered = false;
    img.src = `images/${id}_normal.png`;
    cursorEl.src = 'images/cursor_normal.png';
    cursorEl.style.width = CONFIG.cursorSize.normal + 'px';
  });
  wrap.addEventListener('mousedown', () => {
    img.src = `images/${id}_click.png`;
    cursorEl.src = 'images/cursor_click.png';
    cursorEl.style.width = CONFIG.cursorSize.click + 'px';
    playClick();
    spawnText(wrap);
    recordClick(num);
    setTimeout(() => {
      img.src = hovered ? `images/${id}_over.png` : `images/${id}_normal.png`;
      cursorEl.src = hovered ? 'images/cursor_over.png' : 'images/cursor_normal.png';
      cursorEl.style.width = (hovered ? CONFIG.cursorSize.over : CONFIG.cursorSize.normal) + 'px';
    }, 280);
  });

  return wrap;
}

[1,2,3,4,5].forEach(n => row1.appendChild(buildButton(n)));
[6,7,8,9,10,11].forEach(n => row2.appendChild(buildButton(n)));

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

let msgIdx = 0;
function spawnText(parent) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = CONFIG.messages[msgIdx++ % CONFIG.messages.length];
  el.style.left = (50 + (Math.random() - 0.5) * 40) + '%';
  parent.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

function playClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(); osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

function recordClick(btnNum) {
  if (!CONFIG.scriptUrl || CONFIG.scriptUrl === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  fetch(CONFIG.scriptUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ button: btnNum })
  }).catch(() => {});
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สงกรานต์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;800&family=Anuphan:wght@400;700;800&display=swap" rel="stylesheet">
<script src="config.js"></script>
<style>
  :root {
    --float-font: 'Sarabun', sans-serif;
    --float-size: 1.2rem;
    --float-color: #ffffff;
    --float-stroke: #000000;
    --float-stroke-w: 1px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

  body {
    font-family: var(--float-font);
    min-height: 100vh;
    background: url('images/bg.png') center center / cover no-repeat fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  #custom-cursor {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-20%, -10%);
    height: auto;
    transition: width 0.08s ease;
  }

  .banner-wrap {
    width: 100%;
    max-width: 1200px;
    padding: 24px 24px 0;
    display: flex;
    justify-content: center;
  }
  .banner-wrap img { width: 100%; height: auto; display: block; }

  .grid-wrap {
    width: 100%;
    max-width: 1200px;
    padding: 28px 20px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .btn-row {
    display: flex;
    justify-content: center;
    gap: 16px;
  }

  .btn-item {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
  }

  .btn-item img.btn-img {
    display: block;
    height: auto;
    transition: transform 0.08s ease;
    -webkit-user-drag: none;
  }

  .btn-item:active img.btn-img { transform: scale(0.95); }

  /* float text ใช้ CSS variable ทั้งหมด — ปรับได้จาก admin */
  .float-text {
    position: absolute;
    left: 50%;
    top: 50%;
    pointer-events: none;
    font-family: var(--float-font);
    font-size: var(--float-size);
    font-weight: 800;
    color: var(--float-color);
    /* stroke ด้วย text-shadow แทน outline เพื่อไม่ให้ fuzzy */
    text-shadow:
      calc(-1 * var(--float-stroke-w)) calc(-1 * var(--float-stroke-w)) 0 var(--float-stroke),
      var(--float-stroke-w)            calc(-1 * var(--float-stroke-w)) 0 var(--float-stroke),
      calc(-1 * var(--float-stroke-w)) var(--float-stroke-w)            0 var(--float-stroke),
      var(--float-stroke-w)            var(--float-stroke-w)            0 var(--float-stroke);
    white-space: nowrap;
    letter-spacing: 0.02em;
    animation: floatUp 1.5s ease-out forwards;
    z-index: 1000;
    /* ป้องกันภาพเบลอจาก subpixel */
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
    60%  { opacity: 1; transform: translateX(-50%) translateY(-70px) scale(1.1); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-120px) scale(0.95); }
  }

  /* Music Control */
  #music-ctrl {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 6px 12px;
    transition: all 0.2s;
  }
  #music-ctrl:hover { background: rgba(0,0,0,0.65); }

  #music-toggle {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.1rem;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    width: 24px;
    text-align: center;
  }

  #music-volume {
    -webkit-appearance: none;
    appearance: none;
    width: 70px;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.3);
    outline: none;
    cursor: pointer;
  }
  #music-volume::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
  }

  @media (max-width: 900px) { .btn-row { gap: 8px; } }
  @media (max-width: 600px) { .btn-row { flex-wrap: wrap; } }
</style>
</head>
<body>

<!-- Background Music -->
<audio id="bg-music" loop preload="auto">
  <source src="images/music.mp3" type="audio/mpeg">
</audio>

<div class="banner-wrap">
  <img src="images/banner.png" alt="">
</div>

<div class="grid-wrap">
  <div class="btn-row" id="row1"></div>
  <div class="btn-row" id="row2"></div>
</div>

<img id="custom-cursor" src="images/cursor_normal.png" alt="">

<!-- Music Control -->
<div id="music-ctrl">
  <button id="music-toggle" onclick="toggleMusic()" title="เปิด/ปิดเสียง">♪</button>
  <input type="range" id="music-volume" min="0" max="1" step="0.05" value="0.4"
    oninput="setVolume(this.value)" title="ระดับเสียง">
</div>

<script>
// BACKGROUND MUSIC
const bgMusic = document.getElementById('bg-music');
bgMusic.volume = 0.4;

let musicStarted = false;
let musicMuted = false;

function startMusic() {
  if (!musicStarted) {
    bgMusic.play().catch(() => {});
    musicStarted = true;
    document.getElementById('music-toggle').textContent = '♪';
  }
}
document.addEventListener('click', startMusic, { once: false });
document.addEventListener('touchstart', startMusic, { once: false });

function toggleMusic() {
  if (bgMusic.paused) {
    bgMusic.play().catch(() => {});
    musicMuted = false;
    document.getElementById('music-toggle').textContent = '♪';
  } else {
    bgMusic.pause();
    musicMuted = true;
    document.getElementById('music-toggle').textContent = '♩';
  }
}

function setVolume(val) {
  bgMusic.volume = val;
  if (val == 0) {
    document.getElementById('music-toggle').textContent = '♩';
  } else {
    document.getElementById('music-toggle').textContent = '♪';
    if (bgMusic.paused && musicStarted) bgMusic.play().catch(() => {});
  }
}

function getSetting(key, fallback) {
  const saved = localStorage.getItem('cfg_' + key);
  return saved !== null ? JSON.parse(saved) : fallback;
}

const CFG = {
  messages:    getSetting('messages',    CONFIG.messages),
  buttonNames: getSetting('buttonNames', CONFIG.buttonNames),
  scriptUrl:   getSetting('scriptUrl',   CONFIG.scriptUrl),
  buttonWidth: getSetting('buttonWidth', CONFIG.buttonWidth),
  cursorSize:  getSetting('cursorSize',  CONFIG.cursorSize),
  floatFont:   getSetting('floatFont',   CONFIG.floatFont   || 'Sarabun'),
  floatSize:   getSetting('floatSize',   CONFIG.floatSize   || 1.2),
  floatColor:  getSetting('floatColor',  CONFIG.floatColor  || '#ffffff'),
  floatStroke:      getSetting('floatStroke',      CONFIG.floatStroke      || '#000000'),
  floatStrokeWidth: getSetting('floatStrokeWidth', CONFIG.floatStrokeWidth || 1),
};

// ใส่ CSS variable จาก config
const root = document.documentElement;
root.style.setProperty('--float-font', `'${CFG.floatFont}', sans-serif`);
root.style.setProperty('--float-size', CFG.floatSize + 'rem');
root.style.setProperty('--float-color', CFG.floatColor);
root.style.setProperty('--float-stroke',   CFG.floatStroke);
root.style.setProperty('--float-stroke-w', CFG.floatStrokeWidth + 'px');

// CURSOR
const cursorEl = document.getElementById('custom-cursor');
cursorEl.style.width = CFG.cursorSize.normal + 'px';

document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
});

// BUILD BUTTONS
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function buildButton(num) {
  const id = pad(num);
  const wrap = document.createElement('div');
  wrap.className = 'btn-item';

  const img = document.createElement('img');
  img.className = 'btn-img';
  img.style.width = CFG.buttonWidth + 'px';
  img.src = `images/${id}_normal.png`;
  img.alt = CFG.buttonNames[num - 1] || `ปุ่มที่ ${num}`;
  img.draggable = false;
  wrap.appendChild(img);

  let hovered = false;

  wrap.addEventListener('mouseenter', () => {
    hovered = true;
    img.src = `images/${id}_over.png`;
    cursorEl.src = 'images/cursor_over.png';
    cursorEl.style.width = CFG.cursorSize.over + 'px';
  });
  wrap.addEventListener('mouseleave', () => {
    hovered = false;
    img.src = `images/${id}_normal.png`;
    cursorEl.src = 'images/cursor_normal.png';
    cursorEl.style.width = CFG.cursorSize.normal + 'px';
  });
  wrap.addEventListener('mousedown', () => {
    img.src = `images/${id}_click.png`;
    cursorEl.src = 'images/cursor_click.png';
    cursorEl.style.width = CFG.cursorSize.click + 'px';
    playClick();
    spawnText(wrap);
    recordClick(num);
    setTimeout(() => {
      img.src = hovered ? `images/${id}_over.png` : `images/${id}_normal.png`;
      cursorEl.src = hovered ? 'images/cursor_over.png' : 'images/cursor_normal.png';
      cursorEl.style.width = (hovered ? CFG.cursorSize.over : CFG.cursorSize.normal) + 'px';
    }, 280);
  });

  return wrap;
}

[1,2,3,4,5,6].forEach(n => document.getElementById('row1').appendChild(buildButton(n)));
[7,8,9,10,11].forEach(n => document.getElementById('row2').appendChild(buildButton(n)));

// FLOAT TEXT
let msgIdx = 0;
function spawnText(parent) {
  const el = document.createElement('div');
  el.className = 'float-text';
  el.textContent = CFG.messages[msgIdx++ % CFG.messages.length];
  el.style.left = (50 + (Math.random() - 0.5) * 40) + '%';
  parent.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

// SOUND — เสียงลำธารไหลเบาๆ สั้น
function playClick() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dur = 0.35;
    const now = ctx.currentTime;

    const bufLen = ctx.sampleRate * dur;
    const buffer = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    // Lowpass — เก็บความถี่ต่ำ ตัดเสียงแหลมออก ให้นุ่มขึ้น
    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.setValueAtTime(600, now);
    lp.frequency.exponentialRampToValueAtTime(300, now + dur);
    lp.Q.value = 0.5;

    // Highpass — ตัดเบสหนักออก
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 180;

    // Gain เบา — ค่อยๆ ขึ้นแล้วจางช้าๆ เหมือนน้ำกระเพื่อม
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.18, now + 0.06);
    gain.gain.setValueAtTime(0.18, now + 0.12);
    gain.gain.exponentialRampToValueAtTime(0.001, now + dur);

    noise.connect(lp);
    lp.connect(hp);
    hp.connect(gain);
    gain.connect(ctx.destination);

    noise.start(now);
    noise.stop(now + dur);
  } catch(e) {}
}

// RECORD CLICK
function recordClick(btnNum) {
  if (!CFG.scriptUrl || CFG.scriptUrl === 'YOUR_APPS_SCRIPT_URL_HERE') return;
  fetch(CFG.scriptUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ button: btnNum })
  }).catch(() => {});
}
</script>
</body>
</html>
